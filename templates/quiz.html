<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Quiz</h2>

<form method="POST" action="/submit-quiz">

{% for q in questions %}
<div class="card p-3 mb-3">
    <h5>{{ q[1] }}</h5>

    <input type="radio" name="{{ q[0] }}" value="{{ q[2] }}"> {{ q[2] }} <br>
    <input type="radio" name="{{ q[0] }}" value="{{ q[3] }}"> {{ q[3] }} <br>
    <input type="radio" name="{{ q[0] }}" value="{{ q[4] }}"> {{ q[4] }} <br>
    <input type="radio" name="{{ q[0] }}" value="{{ q[5] }}"> {{ q[5] }} <br>

</div>
{% endfor %}

<button class="btn btn-success">Submit Quiz</button>

</form>

</body>
</html>
