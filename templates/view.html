<!DOCTYPE html>
<html>
<head>
    <title>View File</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>File Viewer</h2>

<!-- VIDEO -->
{% if ext in ['mp4', 'webm'] %}
<video width="100%" controls>
    <source src="/static/uploads/{{ file }}" type="video/mp4">
</video>

<!-- PDF -->
{% elif ext == 'pdf' %}
<iframe src="/static/uploads/{{ file }}" width="100%" height="600px"></iframe>

<!-- IMAGE -->
{% elif ext in ['jpg', 'jpeg', 'png'] %}
<img src="/static/uploads/{{ file }}" class="img-fluid">

<!-- OTHER -->
{% else %}
<p>File type not supported for preview.</p>
<a href="/static/uploads/{{ file }}" class="btn btn-primary">Download</a>
{% endif %}

<br><br>
<a href="/dashboard" class="btn btn-secondary">Back</a>

</body>
</html>
