<!DOCTYPE html>
<html>
<head>
    <title>Add Question</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Add Quiz Question 🧠</h2>

<form method="POST">

    <input class="form-control mb-2" name="question" placeholder="Enter Question" required>

    <input class="form-control mb-2" name="option1" placeholder="Option 1" required>
    <input class="form-control mb-2" name="option2" placeholder="Option 2" required>
    <input class="form-control mb-2" name="option3" placeholder="Option 3" required>
    <input class="form-control mb-2" name="option4" placeholder="Option 4" required>

    <input class="form-control mb-2" name="answer" placeholder="Correct Answer" required>

    <button class="btn btn-success">Add Question</button>

</form>

<br>
<a href="/dashboard" class="btn btn-primary">Back</a>

</body>
</html>
