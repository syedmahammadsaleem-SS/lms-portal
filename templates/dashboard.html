<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">LMS Portal</span>
        <a href="/" class="btn btn-light">Home</a>
    </div>
</nav>

<div class="container mt-4">

    <h2>Dashboard</h2>

    <!-- ✅ ACTION BUTTONS -->
    <div class="mb-4">
        <a href="/quiz" class="btn btn-dark me-2">Take Quiz</a>
        <a href="/add-question" class="btn btn-warning me-2">Add Quiz Question</a>
        <a href="/chatbot" class="btn btn-info">AI Chatbot 🤖</a>
    </div>

    <!-- ✅ ADD COURSE -->
    <div class="card p-3 mb-4">
        <h4>Add Course</h4>

        <form method="POST" action="/add-course">
            <input class="form-control mb-2" name="title" placeholder="Course Title" required>
            <input class="form-control mb-2" name="description" placeholder="Description" required>
            <input class="form-control mb-2" name="file" placeholder="Enter file name (example: video.mp4)" required>
            <button class="btn btn-primary">Add Course</button>
        </form>
    </div>

    <!-- ✅ UPLOAD FILE -->
    <div class="card p-3 mb-4">
        <h4>Upload File</h4>

        <form method="POST" action="/upload" enctype="multipart/form-data">
            <input type="file" name="file" class="form-control mb-2" required>
            <button class="btn btn-warning">Upload</button>
        </form>
    </div>

    <!-- ✅ FILES -->
    <h3>Uploaded Files</h3>
    <div class="row">
        {% for file in files %}
        <div class="col-md-4">
            <div class="card p-3 mb-3 shadow">
                <p><strong>{{ file }}</strong></p>
                <a href="/view/{{ file }}" class="btn btn-info">Open File</a>
            </div>
        </div>
        {% endfor %}
    </div>

    <!-- ✅ COURSES -->
    <h3 class="mt-4">All Courses</h3>
    <div class="row">
        {% for course in courses %}
        <div class="col-md-4">
            <div class="card p-3 mb-3 shadow">
                <h5>{{ course[1] }}</h5>
                <p>{{ course[2] }}</p>
                <a href="/view/{{ course[3] }}" class="btn btn-success">
                    Watch Course
                </a>
            </div>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
